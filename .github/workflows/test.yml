name: Test PR

on:
  pull_request:
  push:
    branches:
      - main

permissions: read-all

jobs:
  test-go:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: go build -o ocp-doc-checker .

  test-cli:
    name: Test CLI - ${{ matrix.test.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - { name: 'Outdated URL', script: 'test-outdated-url.sh', continue: true }
          - { name: 'Current URL', script: 'test-current-url.sh', continue: false }
          - { name: 'URL Accessibility', script: 'test-url-accessibility.sh', continue: false }
          - { name: 'Invalid URL', script: 'test-invalid-url.sh', continue: false }
          - { name: 'URL Replacement', script: 'test-url-replacement.sh', continue: false }
          - { name: 'Anchor Validation', script: 'test-anchor-validation.sh', continue: false }
    steps:
      - name: Check Red Hat Status
        uses: palmsoftware/redhat-status@v0
        with:
          components: |
            docs.redhat.com

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'

      - name: Build tool
        run: go build -o ocp-doc-checker .

      - name: Run test - ${{ matrix.test.name }}
        continue-on-error: ${{ matrix.test.continue }}
        run: ./scripts/${{ matrix.test.script }}

  test-action:
    name: Test GitHub Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Test Action with outdated URL
        id: test_outdated
        uses: ./
        continue-on-error: true
        with:
          url: 'https://docs.redhat.com/en/documentation/openshift_container_platform/4.17/html-single/disconnected_environments/index#mirroring-image-set-full'
          fail-on-outdated: true
          verbose: true

      - name: Verify outdated detection
        if: steps.test_outdated.outcome == 'failure'
        run: ./scripts/verify-action-outdated.sh "${{ steps.test_outdated.outputs.is-outdated }}"

      - name: Test Action with current URL
        id: test_current
        uses: ./
        with:
          url: 'https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html-single/disconnected_environments/index#mirroring-image-set-partial'
          fail-on-outdated: false
          verbose: true

      - name: Verify current detection
        if: steps.test_current.outcome == 'success'
        run: ./scripts/verify-action-current.sh "${{ steps.test_current.outputs.is-outdated }}" "${{ steps.test_current.outputs.latest-version }}"

      - name: Action Test Summary
        if: always()
        run: ./scripts/generate-action-test-summary.sh "${{ steps.test_outdated.outcome }}" "${{ steps.test_outdated.outputs.is-outdated }}" "${{ steps.test_current.outcome }}" "${{ steps.test_current.outputs.is-outdated }}"

